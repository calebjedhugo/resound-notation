<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>resound-notation snap</title>
    <style>
      html, body { margin: 0; padding: 0; background: #fff; }
      #host { display: inline-block; padding: 8px; }
      #host svg { display: block; }
      /* Marker class flipped to "ready" once render completes; used by headless driver. */
      body.ready::after {
        content: "ready";
        position: fixed;
        bottom: 0;
        right: 0;
        font-size: 1px;
        color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="host"></div>
    <script type="module">
      import { NotationRenderer } from '../src/NotationRenderer.js';

      const params = new URLSearchParams(location.search);
      const presetName = params.get('preset') || 'single-voice-treble';
      const width = parseInt(params.get('width') || '800', 10);
      const scale = parseFloat(params.get('scale') || '1');

      const presetModules = import.meta.glob('./presets/*.js', { eager: true });
      const presets = Object.values(presetModules)
        .map((m) => m.default)
        .filter((p) => p && p.name && p.song);

      const preset = presets.find((p) => p.name === presetName);
      const host = document.getElementById('host');

      if (!preset) {
        host.textContent = `unknown preset: ${presetName}\navailable: ${presets.map((p) => p.name).join(', ')}`;
        document.body.classList.add('ready');
      } else {
        const renderer = new NotationRenderer({ container: host, width, scale });
        renderer.render(preset.song);
        // Measure synchronously from the SVG attributes so headless Chrome
        // (which under --virtual-time-budget doesn't reliably run rAF before
        // --dump-dom) can read the size out of a meta tag. Add a small margin
        // so descenders/stems and the host's 8px padding aren't shaved.
        const svg = host.querySelector('svg');
        let svgW = svg ? parseFloat(svg.getAttribute('width')) || 0 : 0;
        let svgH = svg ? parseFloat(svg.getAttribute('height')) || 0 : 0;
        // The renderer now grows the viewBox/height to the actual content
        // bbox internally (content-aware viewport), so no extra buffer is
        // needed here. Just allow SVG-internal overflow so the snap
        // capture matches the reported attributes.
        if (svg) {
          svg.style.overflow = 'visible';
        }
        const w = Math.ceil(svgW + 24);
        const h = Math.ceil(svgH + 24);
        const meta = document.createElement('meta');
        meta.name = 'snap-size';
        meta.content = `${w}x${h}`;
        document.head.appendChild(meta);
        document.body.classList.add('ready');
      }
    </script>
  </body>
</html>
